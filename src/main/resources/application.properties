spring.application.name=BootProjREST1

server.port=8082
#server.servlet.context-path=/register
# Database Configuration
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=system
spring.datasource.password=system

# Mail configuration (set app.mail.enabled=true and SMTP details to send real emails)
app.mail.enabled=false
app.mail.from=Customer Data manipulation <noreply@customerdata.com>
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT configuration
app.jwt.secret=CustomerDataManipulationSecretKeyForJwtSigning2026
app.jwt.expiration-ms=86400000
